<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inventory Cloud</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">
        Inventory Management System
    </h1>

 <!-- REGISTER -->
    <div class="card p-4 shadow mb-4">

        <h3>Register</h3>

        <input
            type="text"
            id="registerUsername"
            class="form-control mb-3"
            placeholder="Username"
        >

        <input
            type="password"
            id="registerPassword"
            class="form-control mb-3"
            placeholder="Password"
        >

        <button
            class="btn btn-success"
            onclick="register()"
        >
            Register
        </button>

    </div>

    <!-- LOGIN -->
    <div class="card p-4 shadow mb-4">

        <h3>Login</h3>

        <input
            type="text"
            id="loginUsername"
            class="form-control mb-3"
            placeholder="Username"
        >

        <input
            type="password"
            id="loginPassword"
            class="form-control mb-3"
            placeholder="Password"
        >

        <button
            class="btn btn-primary"
            onclick="login()"
        >
            Login
        </button>

    </div>

   

    <!-- ADD PRODUCT -->
    <div class="card p-4 shadow mb-4">

        <h3>Add Product</h3>

        <input
            type="text"
            id="name"
            class="form-control mb-3"
            placeholder="Product Name"
        >

        <input
            type="text"
            id="category"
            class="form-control mb-3"
            placeholder="Category"
        >

        <input
            type="number"
            id="quantity"
            class="form-control mb-3"
            placeholder="Quantity"
        >

        <input
            type="number"
            id="price"
            class="form-control mb-3"
            placeholder="Price"
        >

        <button
            class="btn btn-dark"
            onclick="addProduct()"
        >
            Add Product
        </button>

    </div>

    <!-- SEARCH -->
    <div class="card p-4 shadow mb-4">

        <h3>Search Product</h3>

        <input
            type="text"
            id="searchInput"
            class="form-control mb-3"
            placeholder="Search by name"
        >

        <button
            class="btn btn-warning"
            onclick="searchProduct()"
        >
            Search
        </button>

    </div>

    <!-- PRODUCTS TABLE -->
    <div class="card p-4 shadow">

        <h3>Products</h3>

        <table class="table table-bordered mt-3">

            <thead class="table-dark">

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody id="productTable"></tbody>

        </table>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
